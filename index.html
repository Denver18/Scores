<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Marcador</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto !important; 
            background: transparent;
        }
        /* Contenedor lateral derecho */
        .marcador-mundial {
            position: fixed; 
            right: 15px; 
            top: 65px;
            width: 280px;
            height: 500px;
            z-index: 9999;
            pointer-events: auto !important; 
            background-color: #051911; /* Verde oscuro idéntico a la imagen */
            border: 1px solid #133827;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        /* Pestañas superiores de navegación */
        .tabs-container {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        /* Estado activo de las pestañas */
        .tab-btn.active[data-tab="vivo"] {
            background-color: #00a86b;
            color: white;
        }
        .tab-btn.active[data-tab="proximos"] {
            background-color: #00a86b;
            color: white;
        }
        /* Estado inactivo general */
        .tab-btn:not(.active) {
            background-color: #0b2218;
            color: #4b6b5b;
        }
        /* Contenedor de lista con scroll */
        .matches-list {
            overflow-y: auto !important;
            flex-grow: 1;
            padding-right: 2px;
        }
        .matches-list::-webkit-scrollbar {
            width: 4px;
        }
        .matches-list::-webkit-scrollbar-thumb {
            background: #1a4231;
            border-radius: 4px;
        }
        /* Bloque de partido */
        .match-card {
            background-color: #091f15;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #112e21;
            display: none; /* Oculto por defecto para que JS lo controle */
        }
        /* Mostrar elementos activos */
        .match-card.show {
            display: block !important;
        }
        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-box {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 38%;
        }
        .team-box.right {
            justify-content: flex-end;
        }
        .flag-emoji {
            font-size: 20px;
            line-height: 1;
        }
        .team-name {
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .score-box {
            font-size: 16px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        .score-live {
            color: #ff3b30;
        }
        .score-final {
            color: #ffd214;
        }
        .score-vs {
            color: #8fa399;
            font-size: 12px;
        }
        /* Etiquetas de estado */
        .status-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 6px;
        }
        .badge-live {
            background-color: #ff3b30;
            color: white;
            animation: pulse 1.5s infinite;
        }
        .badge-final {
            background-color: #1a1e12;
            color: #ffd214;
            border: 1px solid #383411;
        }
        .badge-time {
            background-color: #172a21;
            color: #8fa399;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
