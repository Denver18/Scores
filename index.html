<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto !important; 
            background: transparent;
        }
        /* Contenedor principal posicionado en Jaquemate */
        .marcador-mundial {
            position: absolute;
            right: 15px; 
            top: 65px;
            width: 280px;
            height: 500px;
            z-index: 9999;
            /* CAMBIO CRÍTICO: Obliga al navegador a priorizar los clics aquí */
            pointer-events: auto !important; 
        }
        /* Forzado de scroll nativo sobre el iframe */
        .marcador-mundial iframe {
            width: 100%;
            height: 100%;
            /* CAMBIO CRÍTICO: Habilita el desplazamiento táctil y de rueda en navegadores web */
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch !important;
        }
    </style>
</head>
<body>

    <div class="marcador-mundial">
        <!-- AQUÍ ESTÁ TU CÓDIGO DE SCOREMER -->
        <iframe src='https://scoremer.com' frameborder='0'></iframe>
    </div>

</body>
</html>
