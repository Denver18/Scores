<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* CAMBIO: Permitir scroll vertical en lugar de ocultarlo */
            overflow-y: auto; 
            background: transparent;
        }
        .marcador-mundial {
            position: absolute;
            right: 15px; 
            top: 65px;
            width: 280px;
            /* CAMBIO: Altura máxima flexible para la caja contenedora */
            max-height: 500px; 
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="marcador-mundial">
        <!-- El iframe ahora usará el scroll automático nativo de Scoremer -->
        <iframe style='width:100%; height:500px;' src='https://scoremer.com' scrolling='yes' frameborder='0'></iframe>
    </div>

</body>
</html>
