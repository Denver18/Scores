<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Lateral xat.com</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Narrow', sans-serif;
        }

        body {
            background-color: transparent; /* Fondo transparente para acoplarse a xat */
            display: flex;
            justify-content: flex-end; /* Alineación total a la derecha */
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        /* Contenedor adaptado para la barra lateral derecha de xat */
        .sidebar-container {
            width: 290px; 
            height: calc(100vh - 20px);
            background-color: #061c12;
            border-radius: 16px;
            padding: 12px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.6);
            border: 1px solid #1a3327;
            display: flex;
            flex-direction: column;
        }

        .tournament-title {
            color: #ffd700;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .tab.active {
            background-color: #0e5e43;
            color: #ffffff;
        }

        .tab.inactive {
            background-color: #162a21;
            color: #7b8e85;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
        }

        /* Zona con scroll para los partidos */
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 2px;
        }

        .match-card {
            background-color: #04140d;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid #11281c;
        }

        .match-card.live-border {
            border: 1px solid #b32424;
        }

        .match-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 35%;
        }

        .team.home { justify-content: flex-start; }
        .team.away { justify-content: flex-end; flex-direction: row-reverse; }

        .flag {
            font-size: 16px;
        }

        .team-name {
            color: #ffffff;
            font-weight: bold;
            font-size: 13px;
        }

        .score-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 19px;
            font-weight: 900;
            color: #ffffff;
        }

        .score-live { color: #ff3333; }
        .score-final { color: #ffd700; }

        .time-status {
            font-size: 10px;
            margin-top: 1px;
            font-weight: bold;
        }
        .time-status.live-time { color: #ff3333; }
        .time-status.final-time { color: #7b8e85; }

        .badge-row {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }

        .badge {
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .badge.live {
            background-color: #ff3333;
            color: white;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .badge.final {
            background-color: #ffd700;
            color: #000000;
        }

        .status-msg {
            color: #7b8e85;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }

        .match-list::-webkit-scrollbar {
            width: 4px;
        }
        .match-list::-webkit-scrollbar-thumb {
            background: #1a3327;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar-container">
        <div class="tournament-title" id="tournament-name">Cargando Torneo...</div>
        
        <div class="tabs">
            <button class="tab active"><span class="dot"></span> En Vivo</button>
            <button class="tab inactive">Próximos</button>
        </div>

        <div class="match-list" id="match-container">
            <div class="status-msg">Conectando con el archivo de resultados...</div>
        </div>
    </div>

    <script>
        // URL DEL ARCHIVO JSON EXTERNO
        // Reemplaza esta URL de ejemplo por el enlace real donde subas tu archivo JSON
        const JSON_URL = "https://jsonbin.io"; 

        async function consultarArchivoExterno() {
            try {
                const respuesta = await fetch(JSON_URL);
                const datos = await respuesta.json();
                
                // Actualizar el título del torneo desde el JSON si existe
                document.getElementById("tournament-name").innerText = datos.torneo || "MUNDIAL 2026";
                
                const listaPartidos = datos.partidos;
                const container = document.getElementById("match-container");
                container.innerHTML = ""; 

                if(!listaPartidos || listaPartidos.length === 0){
                    container.innerHTML = '<div class="status-msg">No hay partidos registrados en el archivo.</div>';
                    return;
                }

                listaPartidos.forEach(match => {
                    let isLive = match.status === "LIVE";
                    let isFinal = match.status === "FT";

                    let cardClass = isLive ? "match-card live-border" : "match-card";
                    let scoreClass = isLive ? "score-live" : (isFinal ? "score-final" : "");
                    let timeClass = isLive ? "time-status live-time" : "time-status final-time";
                    
                    let badgeHTML = "";
                    if (isLive) {
                        badgeHTML = `<div class="badge-row"><span class="badge live"><span class="dot" style="background:#fff; width:5px; height:5px;"></span> En Vivo</span></div>`;
                    } else if (isFinal) {
                        badgeHTML = `<div class="badge-row"><span class="badge final">Final</span></div>`;
                    }

                    const cardHTML = `
                        <div class="${cardClass}">
                            <div class="match-main">
                                <div class="team home">
                                    <span class="flag">${match.homeFlag}</span>
                                    <span class="team-name">${match.home}</span>
                                </div>
                                <div class="score-center">
                                    <div class="score-row ${scoreClass}">
                                        <span>${match.homeGoals}</span>
                                        <span style="font-size:14px; color:#7b8e85;">:</span>
                                        <span>${match.awayGoals}</span>
                                    </div>
                                    <span class="${timeClass}">${match.time}</span>
                                </div>
                                <div class="team away">
                                    <span class="team-name">${match.away}</span>
                                    <span class="flag">${match.awayFlag}</span>
                                </div>
                            </div>
                            ${badgeHTML}
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("Error al leer el archivo JSON:", error);
                document.getElementById("match-container").innerHTML = '<div class="status-msg">Error de sincronización con el archivo externo.</div>';
            }
        }

        // Carga inicial al abrir la barra
        consultarArchivoExterno();

        // Revisa el archivo externo cada 20 segundos para ver si cambiaste un gol o minuto
        setInterval(consultarArchivoExterno, 20000);
    </script>
</body>
</html>
