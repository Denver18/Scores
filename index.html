<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Lateral Derecho xat</title>
    <style>
        /* Forzar la alineación hacia la derecha */
        body {
            background-color: transparent;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* Mueve todo el contenido a la derecha */
            width: 100%;
        }

        /* Contenedor con la medida exacta para el lateral de xat */
        .marcador-lateral {
            background-color: #041a12;
            width: 300px; /* Ancho fijo ideal para la barra de xat */
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 1px solid #062e20;
            box-sizing: border-box;
        }

        /* Pestañas de Filtros */
        .pestanas-mini {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .btn-mini {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
        }

        .btn-mini.activo {
            background-color: #0d8358;
            color: #ffffff;
        }

        .btn-mini.inactivo {
            background-color: #122b22;
            color: #7b978d;
        }

        /* Tarjetas de partidos */
        .fila-partido {
            background-color: #062318;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #0a3324;
        }

        .fila-partido.en-vivo {
            border: 1px solid #731317;
            background: linear-gradient(180deg, #0d2119 0%, #170d0f 100%);
        }

        /* Bloques de Equipos */
        .equipo-caja {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 35%;
            color: #ffffff;
            font-weight: bold;
            font-size: 12px;
        }

        .equipo-caja.local { justify-content: flex-start; }
        .equipo-caja.visitante { justify-content: flex-end; }

        .bandera-icono {
            font-size: 16px;
            display: inline-block;
        }

        /* Sección del Marcador Central */
        .score-caja {
            width: 30%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .num-goles {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .num-goles.rojo { color: #ff3b30; }
        .num-goles.amarillo { color: #e2b93b; }

        .tiempo-min {
            font-size: 9px;
            font-weight: bold;
            margin-top: -1px;
        }
        .tiempo-min.rojo { color: #ff3b30; }

        /* Etiquetas */
        .tag-estado {
            font-size: 8px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            margin-top: 3px;
            text-transform: uppercase;
        }

        .tag-estado.vivo {
            background-color: #ff3b30;
            color: white;
        }

        .tag-estado.fin {
            background-color: #172b17;
            color: #e2b93b;
            border: 1px solid #2e4a2e;
        }
    </style>
</head>
<body>

    <div class="marcador-lateral">
        
        <div class="pestanas-mini">
            <button class="btn-mini activo">🔴 EN VIVO</button>
            <button class="btn-mini inactivo">🗓️ PRÓXIMOS</button>
        </div>

        <!-- Partido 1 -->
        <div class="fila-partido en-vivo">
            <div class="equipo-caja local">
                <span class="bandera-icono">🇪🇬</span>
                <span>EGY</span>
            </div>
            <div class="score-caja">
                <div class="num-goles rojo">1 : 1</div>
                <div class="tiempo-min rojo">3T</div>
                <div class="tag-estado vivo">Vivo</div>
            </div>
            <div class="equipo-caja visitante">
                <span>IRN</span>
                <span class="bandera-icono">🇮🇷</span>
            </div>
        </div>

        <!-- Partido 2 -->
        <div class="fila-partido en-vivo">
            <div class="equipo-caja local">
                <span class="bandera-icono">🇳🇿</span>
                <span>NZL</span>
            </div>
            <div class="score-caja">
                <div class="num-goles rojo">0 : 1</div>
                <div class="tiempo-min rojo">3T</div>
                <div class="tag-estado vivo">Vivo</div>
            </div>
            <div class="equipo-caja visitante">
                <span>BEL</span>
                <span class="bandera-icono">🇧🇪</span>
            </div>
        </div>

        <!-- Partido 3 -->
        <div class="fila-partido">
            <div class="equipo-caja local">
                <span class="bandera-icono">🇺🇾</span>
                <span>URU</span>
            </div>
            <div class="score-caja">
                <div class="num-goles amarillo">0 : 1</div>
                <div class="tag-estado fin">Final</div>
            </div>
            <div class="equipo-caja visitante">
                <span>ESP</span>
                <span class="bandera-icono">🇪🇸</span>
            </div>
        </div>

    </div>

</body>
</html>
