<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Lateral Medidas Exactas</title>
    <style>
        body {
            background-color: transparent;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* Alineado al lado derecho */
            width: 100%;
        }

        /* MEDIDAS EXACTAS BASADAS EN TU IMAGEN */
        .marcador-lateral {
            background-color: #041a12;
            width: 340px;          /* Ancho exacto proporcionado */
            height: 580px;         /* Altura alargada de la imagen */
            border-radius: 20px;   /* Esquinas bien redondeadas como tu captura */
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 2px solid #0d3a2a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor interno para permitir scroll si se acumulan muchos partidos */
        .lista-partidos-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }

        /* Ocultar barra de scroll para mantener diseño limpio */
        .lista-partidos-scroll::-webkit-scrollbar {
            width: 0px;
        }

        .pestanas-mini {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-mini {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-mini.activo {
            background-color: #0d8358;
            color: #ffffff;
        }

        .btn-mini.inactivo {
            background-color: #122b22;
            color: #7b978d;
        }

        .oculto {
            display: none !important;
        }

        /* Estructura de las filas idéntica a tu imagen */
        .fila-partido {
            background-color: #062318;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #0a3324;
        }

        .fila-partido.en-vivo {
            border: 1px solid #731317;
            background: linear-gradient(180deg, #0d2119 0%, #170d0f 100%);
        }

        .equipo-caja {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 35%;
            color: #ffffff;
            font-weight: bold;
            font-size: 13px;
        }

        .equipo-caja.local { justify-content: flex-start; }
        .equipo-caja.visitante { justify-content: flex-end; }

        .bandera-icono {
            font-size: 18px;
            display: inline-block;
        }

        .score-caja {
            width: 30%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .num-goles {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .num-goles.rojo { color: #ff3b30; }
        .num-goles.amarillo { color: #e2b93b; }
        .num-goles.gris { color: #7b978d; }

        .tiempo-min {
            font-size: 10px;
            font-weight: bold;
            margin-top: -1px;
        }
        .tiempo-min.rojo { color: #ff3b30; }

        .tag-estado {
            font-size: 9px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .tag-estado.vivo {
            background-color: #ff3b30;
            color: white;
        }

        .tag-estado.fin {
            background-color: #172b17;
            color: #e2b93b;
            border: 1px solid #2e4a2e;
        }

        .tag-estado.prog {
            background-color: #122b22;
            color: #7b978d;
            border: 1px solid #1c3d31;
        }
    </style>
</head>
<body>

    <div class="marcador-lateral">
        
        <div class="pestanas-mini">
            <button id="btn-envivo" class="btn-mini activo">🔴 EN VIVO</button>
            <button id="btn-proximos" class="btn-mini inactivo">🗓️ PRÓXIMOS</button>
        </div>

        <div class="lista-partidos-scroll">
            <!-- SECCIÓN: EN VIVO -->
            <div id="contenedor-envivo">
                <div class="fila-partido en-vivo">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇪🇬</span>
                        <span>EGY</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles rojo">1 : 1</div>
                        <div class="tiempo-min rojo">3T</div>
                        <div class="tag-estado vivo">En Vivo</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>IRN</span>
                        <span class="bandera-icono">🇮🇷</span>
                    </div>
                </div>

                <div class="fila-partido en-vivo">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇳🇿</span>
                        <span>NZL</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles rojo">0 : 1</div>
                        <div class="tiempo-min rojo">3T</div>
                        <div class="tag-estado vivo">En Vivo</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>BEL</span>
                        <span class="bandera-icono">🇧🇪</span>
                    </div>
                </div>

                <div class="fila-partido">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇺🇾</span>
                        <span>URU</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles amarillo">0 : 1</div>
                        <div class="tag-estado fin">Final</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>ESP</span>
                        <span class="bandera-icono">🇪🇸</span>
                    </div>
                </div>

                <div class="fila-partido">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇨🇻</span>
                        <span>CPV</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles amarillo">0 : 0</div>
                        <div class="tag-estado fin">Final</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>KSA</span>
                        <span class="bandera-icono">🇸🇦</span>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN: PRÓXIMOS -->
            <div id="contenedor-proximos" class="oculto">
                <div class="fila-partido">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇵🇦</span>
                        <span>PAN</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles gris">vs</div>
                        <div class="tiempo-min" style="color:#7b978d;">16:00</div>
                        <div class="tag-estado prog">Grupo L</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>ENG</span>
                        <span class="bandera-icono">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span>
                    </div>
                </div>

                <div class="fila-partido">
                    <div class="equipo-caja local">
                        <span class="bandera-icono">🇨🇴</span>
                        <span>COL</span>
                    </div>
                    <div class="score-caja">
                        <div class="num-goles gris">vs</div>
                        <div class="tiempo-min" style="color:#7b978d;">18:30</div>
                        <div class="tag-estado prog">Grupo K</div>
                    </div>
                    <div class="equipo-caja visitante">
                        <span>POR</span>
                        <span class="bandera-icono">🇵🇹</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btnEnVivo = document.getElementById('btn-envivo');
        const btnProximos = document.getElementById('btn-proximos');
        const listaEnVivo = document.getElementById('contenedor-envivo');
        const listaProximos = document.getElementById('contenedor-proximos');

        btnEnVivo.addEventListener('click', () => {
            btnEnVivo.className = 'btn-mini activo';
            btnProximos.className = 'btn-mini inactivo';
            listaEnVivo.classList.remove('oculto');
            listaProximos.classList.add('oculto');
        });

        btnProximos.addEventListener('click', () => {
            btnProximos.className = 'btn-mini activo';
            btnEnVivo.className = 'btn-mini inactivo';
            listaProximos.classList.remove('oculto');
            listaEnVivo.classList.add('oculto');
        });
    </script>

</body>
</html>
