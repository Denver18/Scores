<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial xatframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        /* Esto lo posiciona exactamente a la derecha de tu sala Jaquemate */
        .contenedor-mundial {
            position: absolute;
            right: 15px; 
            top: 65px;
            width: 280px;
            height: 485px;
            z-index: 9999;
            background: #1e1e24; /* Color oscuro para que no quede gris vacío */
            border: 1px solid #333;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="contenedor-mundial">
        <!-- Widget compatible con xat de Scorestream -->
        <iframe src="https://scorestream.com" width="100%" height="100%" frameborder="0" scrolling="yes"></iframe>
    </div>

</body>
</html>
