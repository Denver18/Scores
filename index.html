<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador en Vivo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Narrow', sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor Principal estilo Teléfono */
        .phone-container {
            width: 100%;
            max-width: 360px;
            background-color: #061c12;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #1a3327;
        }

        /* Pestañas Superiores */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab.active {
            background-color: #0e5e43;
            color: #ffffff;
        }

        .tab.inactive {
            background-color: #162a21;
            color: #7b8e85;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
        }

        /* Contenedor de Lista de Partidos */
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tarjeta de Partido */
        .match-card {
            background-color: #04140d;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid #11281c;
        }

        /* Estilo especial cuando el partido está EN VIVO */
        .match-card.live-border {
            border: 1px solid #b32424;
        }

        /* Fila Principal de Equipos y Marcador */
        .match-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        /* Bloques de Equipos */
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 35%;
        }

        .team.home { justify-content: flex-start; }
        .team.away { justify-content: flex-end; flex-row-reverse: row; }

        .flag {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #222;
        }

        .team-name {
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* Centro: Goles y Tiempo */
        .score-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 900;
        }

        .score-live { color: #ff3333; }
        .score-final { color: #ffd700; }

        .time-status {
            font-size: 11px;
            margin-top: 2px;
            font-weight: bold;
        }
        .time-status.live-time { color: #ff3333; }
        .time-status.final-time { color: #7b8e85; }

        /* Etiquetas Inferiores de la Tarjeta */
        .badge-row {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .badge {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .badge.live {
            background-color: #ff3333;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge.final {
            background-color: #ffd700;
            color: #000000;
        }

        /* Mensaje de Carga / Sin Partidos */
        .status-msg {
            color: #7b8e85;
            text-align: center;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Pestañas superiores fijas -->
        <div class="tabs">
            <button class="tab active"><span class="dot"></span> En Vivo</button>
            <button class="tab inactive">Próximos</button>
        </div>

        <!-- Espacio donde se cargarán los partidos dinámicamente -->
        <div class="match-list" id="match-container">
            <div class="status-msg">Cargando partidos de hoy...</div>
        </div>
    </div>

    <script>
        // Usamos una API pública y libre de fútbol para obtener resultados reales
        const API_URL = "https://api-sports.io";
        
        // NOTA: Para producción debes registrar tu propia API Key gratuita en api-sports.io
        // Esta es una key de prueba pública de la comunidad que podría expirar.
        const API_KEY = "3cd7f1837a7f45c2ec4df646903f07a7"; 

        async function fetchScores() {
            try {
                const response = await fetch(API_URL, {
                    method: "GET",
                    headers: {
                        "x-rapidapi-host": "v3.football.api-sports.io",
                        "x-rapidapi-key": API_KEY
                    }
                });

                const data = await response.json();
                const fixtures = data.response;
                const container = document.getElementById("match-container");
                
                container.innerHTML = ""; // Limpiar contenedor

                if (!fixtures || fixtures.length === 0) {
                    container.innerHTML = '<div class="status-msg">No hay partidos en vivo en este momento.</div>';
                    return;
                }

                // Generar cada tarjeta de partido dinámicamente
                fixtures.slice(0, 8).forEach(match => {
                    const homeTeam = match.teams.home.name.substring(0, 3).toUpperCase();
                    const awayTeam = match.teams.away.name.substring(0, 3).toUpperCase();
                    const homeFlag = match.teams.home.logo;
                    const awayFlag = match.teams.away.logo;
                    const homeGoals = match.goals.home ?? 0;
                    const awayGoals = match.goals.away ?? 0;
                    
                    const statusCode = match.fixture.status.short; // '1H', '2H', 'FT', etc.
                    const elapsed = match.fixture.status.elapsed;

                    let isLive = ["1H", "2H", "HT", "ET", "P"].includes(statusCode);
                    let isFinal = ["FT", "AET", "PEN"].includes(statusCode);

                    // Definir clases visuales según estado de la imagen de referencia
                    let cardClass = isLive ? "match-card live-border" : "match-card";
                    let scoreClass = isLive ? "score-live" : (isFinal ? "score-final" : "");
                    let timeClass = isLive ? "time-status live-time" : "time-status final-time";
                    
                    let timeText = isLive ? `${elapsed}'` : (isFinal ? "Final" : "00'");
                    
                    let badgeHTML = "";
                    if (isLive) {
                        badgeHTML = `<div class="badge-row"><span class="badge live"><span class="dot" style="background:#fff; width:6px; height:6px;"></span> En Vivo</span></div>`;
                    } else if (isFinal) {
                        badgeHTML = `<div class="badge-row"><span class="badge final">Final</span></div>`;
                    }

                    const cardHTML = `
                        <div class="${cardClass}">
                            <div class="match-main">
                                <div class="team home">
                                    <img class="flag" src="${homeFlag}" alt="${homeTeam}">
                                    <span class="team-name">${homeTeam}</span>
                                </div>
                                <div class="score-center">
                                    <div class="score-row ${scoreClass}">
                                        <span>${homeGoals}</span>
                                        <span style="font-size:18px; margin: 0 4px; color:#7b8e85;">:</span>
                                        <span>${awayGoals}</span>
                                    </div>
                                    <span class="${timeClass}">${timeText}</span>
                                </div>
                                <div class="team away">
                                    <span class="team-name">${awayTeam}</span>
                                    <img class="flag" src="${awayFlag}" alt="${awayTeam}">
                                </div>
                            </div>
                            ${badgeHTML}
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("Error cargando la API:", error);
