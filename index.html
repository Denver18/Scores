<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Marcador</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto !important; 
            background: transparent;
        }
        /* Contenedor lateral derecho */
        .marcador-mundial {
            position: fixed; 
            right: 15px; 
            top: 65px;
            width: 280px;
            height: 500px;
            z-index: 9999;
            pointer-events: auto !important; 
            background-color: #051911; /* Verde oscuro idéntico a la imagen */
            border: 1px solid #133827;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        /* Pestañas superiores de navegación */
        .tabs-container {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        /* Estado activo de las pestañas */
        .tab-btn.active[data-tab="vivo"] {
            background-color: #00a86b;
            color: white;
        }
        .tab-btn.active[data-tab="proximos"] {
            background-color: #3b82f6; /* Azul deportivo para próximos */
            color: white;
        }
        /* Estado inactivo general */
        .tab-btn:not(.active) {
            background-color: #172a21;
            color: #8fa399;
        }
        /* Contenedor de lista con scroll */
        .matches-list {
            overflow-y: auto !important;
            flex-grow: 1;
            padding-right: 2px;
        }
        .matches-list::-webkit-scrollbar {
            width: 4px;
        }
        .matches-list::-webkit-scrollbar-thumb {
            background: #1a4231;
            border-radius: 4px;
        }
        /* Bloque de partido */
        .match-card {
            background-color: #0b2218;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #112e21;
            display: none; /* Controlado mediante JS */
        }
        /* Mostrar elementos activos */
        .match-card.show {
            display: block;
        }
        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-box {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 38%;
        }
        .team-box.right {
            justify-content: flex-end;
        }
        .flag {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            object-fit: cover;
        }
        .team-name {
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .score-box {
            font-size: 15px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        .score-live {
            color: #ff3b30;
        }
        .score-final {
            color: #ffd214;
        }
        .score-vs {
            color: #8fa399;
            font-size: 11px;
        }
        /* Etiquetas de estado */
        .status-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 6px;
        }
        .badge-live {
            background-color: #ff3b30;
            color: white;
            animation: pulse 1.5s infinite;
        }
        .badge-final {
            background-color: #231f13;
            color: #ffd214;
            border: 1px solid #473e1c;
        }
        .badge-time {
            background-color: #1c2d3d;
            color: #60a5fa;
            border: 1px solid #1e3a8a;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="marcador-mundial">
        <!-- Pestañas de navegación interactiva -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="vivo">🔴 En Vivo</button>
            <button class="tab-btn" data-tab="proximos">📅 Próximos</button>
        </div>
        
        <div class="matches-list">
            <!-- SECCIÓN: EN VIVO (data-type="vivo") -->
            <div class="match-card show" data-type="vivo" style="border-left: 3px solid #ff3b30;">
                <div class="match-row">
                    <div class="team-box">
                        <img class="flag" src="https://flagcdn.com" alt="URU">
                        <span class="team-name">URU</span>
                    </div>
                    <div class="score-box score-live">0 : 1</div>
                    <div class="team-box right">
                        <span class="team-name">ESP</span>
                        <img class="flag" src="https://flagcdn.com" alt="ESP">
                    </div>
                </div>
                <center><span class="status-badge badge-live">🔴 En Vivo</span></center>
            </div>

            <div class="match-card show" data-type="vivo" style="border-left: 3px solid #ff3b30;">
                <div class="match-row">
                    <div class="team-box">
                        <img class="flag" src="https://flagcdn.com" alt="CPV">
                        <span class="team-name">CPV</span>
                    </div>
                    <div class="score-box score-live">0 : 0</div>
                    <div class="team-box right">
                        <span class="team-name">KSA</span>
                        <img class="flag" src="https://flagcdn.com" alt="KSA">
                    </div>
                </div>
                <center><span class="status-badge badge-live">🔴 En Vivo</span></center>
            </div>

            <!-- SECCIÓN: PRÓXIMOS Y TERMINADOS (data-type="proximos") -->
            <div class="match-card" data-type="proximos">
                <div class="match-row">
                    <div class="team-box">
                        <img class="flag" src="https://flagcdn.com" alt="NOR">
                        <span class="team-name">NOR</span>
                    </div>
                    <div class="score-box score-final">1 : 4</div>
                    <div class="team-box right">
                        <span class="team-name">FRA</span>
                        <img class="flag" src="https://flagcdn.com" alt="FRA">
                    </div>
                </div>
                <center><span class="status-badge badge-final">Finalizado</span></center>
            </div>

            <div class="match-card" data-type="proximos">
                <div class="match-row">
                    <div class="team-box">
                        <img class="flag" src="https://flagcdn.com" alt="SEN">
                        <span class="team-name">SEN</span>
                    </div>
                    <div class="score-box score-final">5 : 0</div>
                    <div class="team-box right">
                        <span class="team-name">IRQ</span>
                        <img class="flag" src="https://flagcdn.com" alt="IRQ">
                    </div>
                </div>
                <center><span class="status-badge badge-final">Finalizado</span></center>
            </div>

            <div class="match-card" data-type="proximos">
                <div class="match-row">
                    <div class="team-box">
                        <img class="flag" src="https://flagcdn.com" alt="ARG">
                        <span class="team-name">ARG</span>
                    </div>
                    <div class="score-box score-vs">vs</div>
                    <div class="team-box right">
                        <span class="team-name">GER</span>
                        <img class="flag" src="https://flagcdn.com" alt="GER">
                    </div>
                </div>
                <center><span class="status-badge badge-time">Hoy 21:00</span></center>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE INTERACCIÓN NATIVA -->
    <script>
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                // 1. Alternar clases activas en los botones de pestañas
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                // 2. Filtrar las tarjetas de partidos correspondientes
                const selectedTab = button.getAttribute('data-tab');
                document.querySelectorAll('.match-card').forEach(card => {
                    if (card.getAttribute('data-type') === selectedTab) {
                        card.classList.add('show');
                    } else {
                        card.classList.remove('show');
                    }
                });
            });
        });
    </script>
</body>
</html>
