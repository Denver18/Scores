<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 xatframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        /* Ajuste exacto para que encaje a la derecha en la sala Jaquemate */
        .contenedor-mundial {
            position: absolute;
            right: 15px; 
            top: 65px;
            width: 280px;
            height: 485px;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="contenedor-mundial">
        <!-- Widget oficial filtrado para la Copa del Mundo -->
        <iframe src="https://scoremer.com" 
                width="100%" 
                height="100%" 
                frameborder="0" 
                scrolling="yes">
        </iframe>
    </div>

</body>
</html>
