<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Lateral xat.com</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Narrow', sans-serif;
        }

        body {
            background-color: #0b0f19; /* Fondo oscuro típico de fondo de xat */
            display: flex;
            justify-content: flex-end; /* Lo empuja totalmente a la derecha */
            min-height: 100vh;
            padding: 10px;
        }

        /* Contenedor adaptado para la barra lateral derecha de xat.com */
        .sidebar-container {
            width: 300px; /* Ancho ideal para no estorbar el chat */
            height: calc(100vh - 20px);
            background-color: #061c12;
            border-radius: 16px;
            padding: 12px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            border: 1px solid #1a3327;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Permite scroll si hay muchos partidos */
        }

        /* Título del Torneo */
        .tournament-title {
            color: #ffd700;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pestañas */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .tab.active {
            background-color: #0e5e43;
            color: #ffffff;
        }

        .tab.inactive {
            background-color: #162a21;
            color: #7b8e85;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Tarjeta de Partido */
        .match-card {
            background-color: #04140d;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid #11281c;
        }

        .match-card.live-border {
            border: 1px solid #b32424;
        }

        .match-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 35%;
        }

        .team.home { justify-content: flex-start; }
        .team.away { justify-content: flex-end; flex-direction: row-reverse; }

        .flag {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        .team-name {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }

        .score-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 900;
            color: #ffffff;
        }

        .score-live { color: #ff3333; }
        .score-final { color: #ffd700; }

        .time-status {
            font-size: 10px;
            margin-top: 1px;
            font-weight: bold;
        }
        .time-status.live-time { color: #ff3333; }
        .time-status.final-time { color: #7b8e85; }

        .badge-row {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }

        .badge {
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .badge.live {
            background-color: #ff3333;
            color: white;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .badge.final {
            background-color: #ffd700;
            color: #000000;
        }

        /* Barra de scroll personalizada */
        .sidebar-container::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-container::-webkit-scrollbar-thumb {
            background: #1a3327;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar-container">
        <div class="tournament-title">🏆 MUNDIAL 2026 🏆</div>
        
        <div class="tabs">
            <button class="tab active"><span class="dot"></span> En Vivo</button>
            <button class="tab inactive">Próximos</button>
        </div>

        <div class="match-list" id="match-container">
            <!-- Los partidos se inyectan aquí directamente -->
        </div>
    </div>

    <script>
        // DATOS DEL MUNDIAL: Puedes cambiar los goles, minutos o estados aquí abajo 
        // y se actualizarán inmediatamente en tu marcador de xat.
        const partidosMundial = [
            { home: "URU", away: "ESP", homeGoals: 0, awayGoals: 1, time: "89'", status: "LIVE", homeFlag: "🇺🇾", awayFlag: "🇪🇸" },
            { home: "CPV", away: "KSA", homeGoals: 0, awayGoals: 0, time: "89'", status: "LIVE", homeFlag: "🇨🇻", awayFlag: "🇸🇦" },
            { home: "NOR", away: "FRA", homeGoals: 1, awayGoals: 4, time: "Final", status: "FT", homeFlag: "🇳🇴", awayFlag: "🇫🇷" },
            { home: "SEN", away: "IRQ", homeGoals: 5, awayGoals: 0, time: "Final", status: "FT", homeFlag: "🇸🇳", awayFlag: "🇮🇶" },
            { home: "TUR", away: "USA", homeGoals: 3, awayGoals: 2, time: "Final", status: "FT", homeFlag: "🇹🇷", awayFlag: "🇺🇸" },
            { home: "PAR", away: "AUS", homeGoals: 0, awayGoals: 0, time: "Final", status: "FT", homeFlag: "🇵🇾", awayFlag: "🇦🇺" },
            { home: "JPN", away: "SWE", homeGoals: 1, awayGoals: 1, time: "Final", status: "FT", homeFlag: "🇯🇵", awayFlag: "🇸🇪" },
            { home: "TUN", away: "NED", homeGoals: 1, awayGoals: 3, time: "Final", status: "FT", homeFlag: "🇹🇳", awayFlag: "🇳🇱" }
        ];

        function cargarMarcadores() {
            const container = document.getElementById("match-container");
            container.innerHTML = ""; 

            partidosMundial.forEach(match => {
                let isLive = match.status === "LIVE";
                let isFinal = match.status === "FT";

                let cardClass = isLive ? "match-card live-border" : "match-card";
                let scoreClass = isLive ? "score-live" : (isFinal ? "score-final" : "");
                let timeClass = isLive ? "time-status live-time" : "time-status final-time";
                
                let badgeHTML = "";
                if (isLive) {
                    badgeHTML = `<div class="badge-row"><span class="badge live"><span class="dot" style="background:#fff; width:5px; height:5px;"></span> En Vivo</span></div>`;
                } else if (isFinal) {
                    badgeHTML = `<div class="badge-row"><span class="badge final">Final</span></div>`;
                }

                const cardHTML = `
                    <div class="${cardClass}">
                        <div class="match-main">
                            <div class="team home">
                                <span style="font-size: 18px;">${match.homeFlag}</span>
                                <span class="team-name">${match.home}</span>
                            </div>
                            <div class="score-center">
                                <div class="score-row ${scoreClass}">
                                    <span>${match.homeGoals}</span>
                                    <span style="font-size:14px; color:#7b8e85;">:</span>
                                    <span>${match.awayGoals}</span>
                                </div>
                                <span class="${timeClass}">${match.time}</span>
                            </div>
                            <div class="team away">
                                <span class="team-name">${match.away}</span>
                                <span style="font-size: 18px;">${match.awayFlag}</span>
                            </div>
                        </div>
                        ${badgeHTML}
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Ejecuta la carga
        cargarMarcadores();

        // Simula actualización de datos automática cada 30 segundos
        setInterval(cargarMarcadores, 30000);
    </script>
</body>
</html>
